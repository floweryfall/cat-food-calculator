<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="猫の餌の量を計算します。" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Cat Food Calculator</title>

    <!-- pico.css -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />

    <!-- Josefin Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- css for custom -->
    <link rel="stylesheet" href="custom.css" />

    <style>
      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <header class="container">
      <h1>Cat Food Calculator</h1>
      <p>猫の餌の量を計算します。</p>
    </header>

    <main class="container">
      <h2>入力</h2>
      <form id="calcForm">
        <section>
          <div class="grid">
            <div>
              <label for="age">年齢<small>（○歳の部分）</small></label>
              <input
                autocomplete="off"
                autofocus
                id="age"
                max="30"
                min="0"
                name="age"
                type="number"
                aria-required="true"
                aria-describedby="age-hint"
              />
              <small id="age-hint"><b>0</b>から<b>30</b>までの整数を入力</small>
            </div>

            <div>
              <label for="months">年齢<small>（○ヶ月の部分）</small></label>
              <input
                autocomplete="off"
                id="months"
                max="11"
                min="0"
                name="months"
                type="number"
                value="0"
                aria-required="false"
                aria-describedby="months-hint"
              />
              <small id="months-hint"
                ><b>0</b>から<b>11</b>までの整数を入力
                分からない場合は<b>0</b>と入力</small
              >
            </div>

            <div>
              <label for="weight">体重<small>（○kg）</small></label>
              <input
                autocomplete="off"
                id="weight"
                max="20.0"
                min="0.1"
                name="weight"
                step="0.1"
                type="number"
                aria-required="true"
                aria-describedby="weight-hint"
              />
              <small id="weight-hint"
                ><b>0.1</b
                >から<b>20</b>までの小数第一位までの整数または小数を入力</small
              >
            </div>
          </div>

          <fieldset>
            <legend>猫の状態</legend>
            <div class="grid">
              <label>
                <input
                  type="radio"
                  id="status-default"
                  name="status"
                  value="default"
                  checked
                />
                通常
              </label>
              <label>
                <input
                  type="radio"
                  id="status-pregnancy"
                  name="status"
                  value="pregnancy"
                />
                妊娠期
              </label>
              <label>
                <input
                  type="radio"
                  id="status-nursing"
                  name="status"
                  value="nursing"
                />
                授乳期
              </label>
            </div>
          </fieldset>
        </section>

        <section>
          <fieldset>
            <legend>餌の選択方法</legend>
            <label>
              <input
                type="radio"
                id="food-select-drop-down"
                name="food-select"
                value="drop-down"
                checked
              />
              プルダウンメニューから選ぶ
            </label>

            <label>
              <input
                type="radio"
                id="food-select-input-number"
                name="food-select"
                value="input-number"
              />
              餌の量を入力する
            </label>
          </fieldset>

          <div class="food-select hidden" data-panel="drop-down">
            <label for="food">餌を選択</label>
            <select name="food" id="food" required>
              <option selected disabled value="">以下から餌を選択</option>
            </select>
            <small
              ><a
                id="food-link"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                hidden
                >選択した餌の商品ページへ移動する（外部リンク・別のタブで開きます）</a
              ></small
            >
          </div>

          <div class="food-select hidden" data-panel="input-number">
            <label for="food-amount"
              >1日にあげる餌の量<small>（○g）</small></label
            >
            <input
              autocomplete="off"
              id="food-amount"
              max="1000"
              min="1"
              name="food-amount"
              step="1"
              type="number"
              aria-required="true"
              aria-describedby="food-amount-hint"
            />
            <small id="food-amount-hint"
              ><b>1</b>から<b>1000</b>までの整数を入力</small
            >
          </div>

          <fieldset>
            <legend>1日に餌をあげる回数</legend>
            <div class="grid">
              <label>
                <input
                  type="radio"
                  id="times-2"
                  name="times"
                  value="2"
                  checked
                />
                2回
              </label>
              <label>
                <input type="radio" id="times-3" name="times" value="3" />
                3回
              </label>
              <label>
                <input type="radio" id="times-4" name="times" value="4" />
                4回
              </label>
            </div>
          </fieldset>
        </section>

        <button type="submit">計算する</button>
      </form>

      <!-- 結果の表示欄 -->
      <section aria-labelledby="result-heading">
        <h2 id="result-heading">計算結果</h2>

        <p id="result-warning" role="alert"></p>

        <div aria-live="polite" aria-atomic="true">
          <p id="result-total"></p>
          <p id="result-per-time"></p>
        </div>
      </section>
    </main>

    <footer class="container">
      <p>&copy; 2026 floweryfall</p>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
