<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="floweryfall">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="猫の餌の量を計算します。">
    <meta name="robots" content="noindex,nofollow">
    <title>Cat Food Calculator</title>
    <link rel="stylesheet" href="https://fonts.xz.style/serve/inter.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@exampledev/new.css@1.1.2/new.min.css">
</head>

<body>
    <header>
        <h1>Cat Food Calculator</h1>
        <p>猫の餌の量を計算します。</p>
    </header>

    <main>
        <form id="calcForm">
            <label for="months">月齢（○ヶ月）</label>
            <input autocomplete="off" autofocus id="months" max="12" min="0" name="months" type="number">

            <label for="weight">体重（○kg）</label>
            <input autocomplete="off" id="weight" max="10.0" min="0.0" name="weight" step="0.1" type="number">

            <fieldset>
                <legend>餌</legend>
                <div>
                    <label>
                        <input type="radio" name="food" value="wet_tuna" checked>
                        カルカン パウチ 12ヵ月までの子ねこ用 まぐろ
                        <a href="https://kalkan.jp/products/kitten/pouch-jelly-maguro.html" target="_blank">
                            商品ページ
                        </a>
                    </label>
                </div>
                <div>
                    <label>
                        <input type="radio" name="food" value="dry">
                        ビューティープロ ビューティープロ キャット 子猫用 12ヵ月頃まで フィッシュ味
                        <a href="https://www.npf.co.jp/beautypro/cat/lineup/kitten/index.html" target="_blank">
                            商品ページ

                        </a>
                    </label>
                </div>
            </fieldset>

            <fieldset>
                <legend>1日に餌をあげる回数</legend>
                <label>
                    <input type="radio" name="times" value="2" checked>2回
                </label>
                <label>
                    <input type="radio" name="times" value="3">3回
                </label>
                <label>
                    <input type="radio" name="times" value="4">4回
                </label>
            </fieldset>

            <button type="submit">計算する</button>
        </form>

        <!-- 結果の表示欄 -->
        <p id="result-total"></p>
        <p id="result-per-time"></p>
    </main>

    <footer>
        <p>&copy; 2026 floweryfall</p>
    </footer>

    <script src="script.js" defer></script>
</body>

</html>
